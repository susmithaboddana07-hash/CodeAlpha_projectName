<form method="GET" action="{% url 'search' %}">
    <input type="text" name="q" placeholder="Search users..." value="{{ query }}">
    <button type="submit">Search</button>
</form>

<ul>
{% for user in users %}
    <li>
        <a href="{% url 'profile' user.username %}">{{ user.username }}</a>
    </li>
{% empty %}
    <li>No users found</li>
{% endfor %}
</ul>
